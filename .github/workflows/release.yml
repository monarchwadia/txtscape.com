name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: txtscape-mcp/go.mod

      - name: Test
        working-directory: txtscape-mcp
        run: go test -count=1 ./...

      - name: E2E tests
        working-directory: txtscape-mcp
        run: go test -tags=e2e -count=1 ./e2e/

      - name: Check versions are consistent
        working-directory: txtscape-mcp
        run: go run ./cmd/version check

      - name: Check version matches tag
        working-directory: txtscape-mcp
        run: |
          version=$(go run ./cmd/version get)
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::files say $version but tag is v$tag"
            exit 1
          fi

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: arm64, name: txtscape-mcp-darwin-arm64 }
          - { goos: darwin,  goarch: amd64, name: txtscape-mcp-darwin-x64 }
          - { goos: linux,   goarch: amd64, name: txtscape-mcp-linux-x64 }
          - { goos: linux,   goarch: arm64, name: txtscape-mcp-linux-arm64 }
          - { goos: windows, goarch: amd64, name: txtscape-mcp-win32-x64.exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: txtscape-mcp/go.mod

      - name: Build
        working-directory: txtscape-mcp
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o "${{ matrix.name }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: txtscape-mcp/${{ matrix.name }}

  assemble:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: txtscape-mcp/npm/txtscape-mcp/bin
          merge-multiple: true

      - name: Set executable bits
        run: chmod +x txtscape-mcp/npm/txtscape-mcp/bin/txtscape-mcp-*

      - name: Upload assembled package
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: txtscape-mcp/npm/

  prepublish:
    needs: assemble
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest }
          - { os: macos-latest }
          - { os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download assembled package
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: npm/

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pre-publish smoke test
        run: node npm/prepublish/test.js

  publish:
    needs: prepublish
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - name: Download assembled package
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: txtscape-mcp/npm/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: txtscape-mcp/npm/txtscape-mcp/bin/txtscape-mcp-*

      - name: Publish to npm
        working-directory: txtscape-mcp/npm/txtscape-mcp
        run: npm publish --access public --provenance
